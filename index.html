<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EMBER RUN — EMBERWANE</title>
<style>
  html,body{margin:0;height:100%;background:#05040a;overflow:hidden;
    font-family:'Trebuchet MS',system-ui,sans-serif;color:#f4ead8;
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;background:#05040a;box-shadow:0 0 80px rgba(0,0,0,.8);}
  #zones{position:fixed;inset:0;display:none;pointer-events:none;z-index:2;}
  #zones .z{position:absolute;top:0;bottom:0;width:50%;display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:14px;font-size:12px;letter-spacing:2px;opacity:.22;}
  #zones .zl{left:0;color:#ffd9a0;} #zones .zr{right:0;color:#bdf5e8;}
  #rotate{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:#05040a;color:#9ad;letter-spacing:2px;font-size:15px;text-align:center;padding:30px;}
  @media (orientation:portrait) and (pointer:coarse){ #rotate.armed{display:flex;} }
  /* shop button + overlay */
  #openShop{position:fixed;z-index:12;right:max(14px,env(safe-area-inset-right));top:max(14px,env(safe-area-inset-top));
    display:none;background:rgba(20,16,32,.7);border:1.5px solid rgba(255,200,120,.55);color:#ffd9a0;
    padding:9px 16px;border-radius:22px;font-weight:bold;letter-spacing:1px;font-size:14px;cursor:pointer;}
  #shop{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;
    background:rgba(5,4,10,.92);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);overflow:auto;padding:22px 12px;}
  #shop h2{letter-spacing:5px;font-size:24px;margin:6px 0 2px;color:#f4ead8;}
  #shop .wallet{color:#ffd9a0;letter-spacing:1px;margin-bottom:14px;font-size:14px;}
  #shop .tabs{display:flex;gap:10px;margin-bottom:14px;}
  #shop .tab{padding:8px 18px;border:1px solid #2a2438;border-radius:20px;cursor:pointer;font-size:13px;letter-spacing:1px;color:#b9b1c8;}
  #shop .tab.on{border-color:#ffd9a0;color:#ffd9a0;background:#1a1426;}
  #shop .rows{display:flex;flex-direction:column;gap:9px;width:520px;max-width:94vw;}
  .srow{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid #2a2438;border-radius:12px;background:#120f1c;}
  .srow .gem{width:16px;height:16px;border-radius:4px;transform:rotate(45deg);flex:0 0 auto;box-shadow:0 0 8px currentColor;}
  .srow .info{flex:1;} .srow .info .n{font-size:14px;color:#f4ead8;} .srow .info .d{font-size:11px;color:#b9b1c8;}
  .srow button{background:#26203a;border:1px solid #4a4266;color:#f4ead8;border-radius:18px;padding:7px 14px;font-size:12px;letter-spacing:1px;cursor:pointer;white-space:nowrap;}
  .srow button.owned{border-color:#7fd9c9;color:#7fd9c9;} .srow button.sel{background:#16221f;border-color:#7fd9c9;color:#7fd9c9;}
  .srow button.cant{opacity:.4;cursor:default;}
  #shop .close{margin-top:18px;background:transparent;border:1px solid rgba(255,255,255,.3);color:#f4ead8;padding:10px 30px;border-radius:24px;letter-spacing:2px;cursor:pointer;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="960" height="540"></canvas></div>
<div id="zones"><div class="z zl">◀ TAP = FLIP</div><div class="z zr">TAP = JUMP ▶</div></div>
<div id="rotate">↻<br>Rotate to landscape<br>for EMBER RUN.</div>
<button id="openShop">✦ SHOP</button>
<div id="shop">
  <h2>EMBER SHOP</h2>
  <div class="wallet" id="shopWallet"></div>
  <div class="tabs"><div class="tab on" data-tab="skins">SKINS</div><div class="tab" data-tab="upg">UPGRADES</div></div>
  <div class="rows" id="shopRows"></div>
  <button class="close" id="closeShop">CLOSE</button>
</div>
<script>
/* ===================================================================
   EMBER RUN — endless auto-runner for EMBERWANE.
   Verbs: FLIP the world (left half) + JUMP (right half, hold=higher).
   Retention stack: collectible embers, power-ups (magnet/shield/over-
   drive), 3 rotating missions + leveling, a shop (skins + upgrades),
   biomes that shift look every milestone, and new obstacle types
   (spikes to jump, low ceilings that force flip-not-jump).
   =================================================================== */
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const VW=960, VH=540, GY=384, ANCHOR=290, DEATH_Y=GY+250, PPM=64;
const T={ baseSpeed:300, maxAdd:380, rampPer:42, G:2100, jumpV:735, cut:0.45, coyote:0.09, buffer:0.12,
  multMax:6, multDecay:0.34, multGain:0.5, magnetDur:6, odDur:4.5, odSpeed:1.7, biomeM:250 };

/* ---- audio ---- */
let AC,master,drone,muted=false;
function initAudio(){ if(AC)return; try{ AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain(); master.gain.value=muted?0:0.3; master.connect(AC.destination);
  drone=AC.createOscillator(); const dg=AC.createGain(); dg.gain.value=0.05; drone.type='sine';
  drone.frequency.value=70; drone.connect(dg); dg.connect(master); drone.start(); }catch(e){} }
function blip(f,d,type,v,to){ if(!AC||muted)return; const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'square'; o.frequency.value=f; if(to)o.frequency.exponentialRampToValueAtTime(to,AC.currentTime+d);
  g.gain.value=v||0.2; g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+d); }
function noise(d,v,f){ if(!AC||muted)return; const n=AC.createBufferSource(),b=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate);
  const da=b.getChannelData(0); for(let i=0;i<da.length;i++)da[i]=Math.random()*2-1; n.buffer=b;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f||1000;
  const g=AC.createGain(); g.gain.value=v||0.15; g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  n.connect(bp); bp.connect(g); g.connect(master); n.start(); n.stop(AC.currentTime+d); }
function sfx(n){ switch(n){
  case 'jump': blip(420,0.14,'square',0.16,760); break;
  case 'flip': blip(300,0.12,'sawtooth',0.16,560); noise(0.1,0.08,1400); break;
  case 'land': noise(0.07,0.1,500); break;
  case 'clean':blip(720,0.12,'sine',0.18,1180); break;
  case 'perfect':blip(880,0.1,'sine',0.22,1660); blip(1320,0.16,'sine',0.16,1980); noise(0.08,0.1,2600); break;
  case 'ember':blip(880,0.07,'triangle',0.12,1320); break;
  case 'power':blip(520,0.18,'sine',0.2,1040); blip(780,0.2,'sine',0.14,1240); break;
  case 'mission':blip(660,0.14,'triangle',0.2,990); break;
  case 'level':blip(523,0.16,'sine',0.22,784); blip(784,0.22,'sine',0.18,1046); break;
  case 'die':  blip(300,0.4,'sawtooth',0.25,70); noise(0.4,0.2,400); break;
  case 'best': blip(660,0.16,'sine',0.2,990); blip(990,0.22,'sine',0.16,1320); break;
} }
function setDrone(){ if(AC&&drone)drone.frequency.exponentialRampToValueAtTime(aspect==='bloom'?64:92,AC.currentTime+0.3); }

/* ---- biomes (each shifts the whole palette) ---- */
const BIOMES=[
 {name:'CINDERFIELDS', bloom:{sky0:'#0c2520',sky1:'#06140f',gTop:'#2f8a78',gBod:'#15392f',ghost:'rgba(150,240,210,.16)',wick:'#e9fff7',glow:'#5ad2b4',far:'#103a30'},
                       cinder:{sky0:'#241307',sky1:'#120a05',gTop:'#b5632a',gBod:'#3a1d10',ghost:'rgba(255,180,120,.16)',wick:'#ffe9c0',glow:'#ff7a2a',far:'#3a1d10'}},
 {name:'SUNKEN GROVE', bloom:{sky0:'#0a2616',sky1:'#05140b',gTop:'#3fa05a',gBod:'#163a22',ghost:'rgba(170,255,190,.16)',wick:'#eaffe9',glow:'#6ee08a',far:'#103a22'},
                       cinder:{sky0:'#1c2208',sky1:'#0e1205',gTop:'#9aa02a',gBod:'#2f3a10',ghost:'rgba(230,255,140,.16)',wick:'#f2ffc0',glow:'#c8e02a',far:'#2f3a10'}},
 {name:'ASHEN REACH',  bloom:{sky0:'#10202a',sky1:'#080f14',gTop:'#3a8aa0',gBod:'#163039',ghost:'rgba(160,220,255,.16)',wick:'#e9f7ff',glow:'#5ab4d2',far:'#10303a'},
                       cinder:{sky0:'#241018',sky1:'#12080d',gTop:'#b03a55',gBod:'#3a1620',ghost:'rgba(255,160,190,.16)',wick:'#ffe0e9',glow:'#ff5a7a',far:'#3a1620'}},
 {name:'THE STILLNESS',bloom:{sky0:'#1a1430',sky1:'#0a0818',gTop:'#6a5ad2',gBod:'#241f39',ghost:'rgba(200,190,255,.16)',wick:'#f4f0ff',glow:'#9a8aff',far:'#241f39'},
                       cinder:{sky0:'#2a1430',sky1:'#140818',gTop:'#a05ad2',gBod:'#391f39',ghost:'rgba(240,190,255,.16)',wick:'#ffeaff',glow:'#d28aff',far:'#391f39'}} ];
function biome(){ return BIOMES[Math.min(BIOMES.length-1,biomeIdx)]; }
const BIOME_ACC=['#ff7a2a','#6ee08a','#9fb4c8','#b9a0ff'];

/* ---- themed background props per biome ---- */
function drawDeadTree(x,h){ ctx.save(); ctx.translate(x,GY); ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-h);
  ctx.moveTo(0,-h*0.6); ctx.lineTo(-14,-h*0.86); ctx.moveTo(0,-h*0.55); ctx.lineTo(16,-h*0.82);
  ctx.moveTo(0,-h*0.82); ctx.lineTo(-10,-h*1.06); ctx.moveTo(0,-h*0.84); ctx.lineTo(13,-h*1.0); ctx.stroke(); ctx.restore(); }
function drawShip(x,y){ ctx.save(); ctx.translate(x,y+Math.sin(runDist*0.003+x*0.01)*7); ctx.rotate(-0.1); ctx.scale(1.5,1.5);
  ctx.fillStyle='rgba(8,26,24,0.88)';
  // hull
  ctx.beginPath(); ctx.moveTo(-114,0); ctx.quadraticCurveTo(-136,52,-64,60); ctx.lineTo(88,60); ctx.quadraticCurveTo(126,54,118,0); ctx.closePath(); ctx.fill();
  ctx.fillRect(-96,-18,192,20);                       // deck
  // teal rim-light along the hull so it reads underwater
  ctx.strokeStyle='rgba(130,235,205,0.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-114,0); ctx.quadraticCurveTo(-136,52,-64,60); ctx.lineTo(88,60); ctx.stroke();
  // masts + crossbeams
  ctx.strokeStyle='rgba(8,26,24,0.88)'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-30,-18); ctx.lineTo(-48,-146); ctx.moveTo(64,-18); ctx.lineTo(58,-120); ctx.stroke();
  ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(-66,-116); ctx.lineTo(2,-126); ctx.moveTo(36,-100); ctx.lineTo(84,-104); ctx.stroke();
  // tattered sails
  ctx.fillStyle='rgba(80,140,115,0.5)'; ctx.beginPath(); ctx.moveTo(-46,-134); ctx.lineTo(-4,-80); ctx.lineTo(-48,-66); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(58,-112); ctx.lineTo(92,-66); ctx.lineTo(58,-56); ctx.closePath(); ctx.fill();
  ctx.restore(); }
function drawKelp(x,h){ ctx.save(); ctx.translate(x,GY); const sway=Math.sin(runDist*0.01+x*0.03)*9;
  ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=6; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(sway,-h*0.5,sway*0.5,-h); ctx.stroke(); ctx.restore(); }
function drawGodRays(){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.07+0.03*Math.sin(runDist*0.005); ctx.fillStyle='#bfeede';
  for(let i=0;i<5;i++){ const x=70+i*210-(runDist*0.05)%210; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+55,0); ctx.lineTo(x+130,GY); ctx.lineTo(x+25,GY); ctx.closePath(); ctx.fill(); } ctx.restore(); }
function drawPillar(x,h){ ctx.save(); ctx.translate(x,GY); ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(-14,-h); ctx.lineTo(-2,-h+16); ctx.lineTo(6,-h-8); ctx.lineTo(16,-h+10); ctx.lineTo(18,0); ctx.closePath(); ctx.fill(); ctx.restore(); }
function drawSlab(x,y,w){ ctx.save(); ctx.translate(x,y); ctx.beginPath(); ctx.moveTo(-w/2,0); ctx.lineTo(w/2,-6); ctx.lineTo(w/2-8,13); ctx.lineTo(-w/2+6,17); ctx.closePath(); ctx.fill(); ctx.restore(); }
function drawMotes(c,mode,n){ n=n||18; ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle=c; for(let i=0;i<n;i++){ const seed=i*97.13;
  let x=((seed*7 - runDist*(0.05+(i%3)*0.02))%(VW+40)); if(x<0)x+=VW+40; x-=20;
  let y; if(mode==='up') y=GY-((seed*5+runDist*0.06+i*40)%(GY-40));
  else if(mode==='down') y=((seed*5+runDist*0.09)%(GY-30))+20;
  else y=60+((seed*3)%(GY-90))+Math.sin(runDist*0.004+i)*12;
  ctx.globalAlpha=0.35+0.4*Math.abs(Math.sin(runDist*0.012+i)); const rr=(mode==='still'?1.6:2.6)+Math.sin(i)*0.6;
  ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.fill(); }
  ctx.restore(); }
function drawBiomeProps(P){ const idx=Math.min(BIOMES.length-1,biomeIdx); const acc=BIOME_ACC[idx]; const off=runDist*0.12;
  if(idx===0){ // CINDERFIELDS — pulsing fire horizon, burnt forest, rising sparks
    const pulse=0.12+0.06*Math.sin(runDist*0.006); const hg=ctx.createRadialGradient(VW*0.5,GY,10,VW*0.5,GY,380);
    hg.addColorStop(0,'rgba(255,90,20,'+pulse+')'); hg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=hg; ctx.fillRect(0,GY-280,VW,300);
    ctx.fillStyle='rgba(36,11,6,0.72)'; const tw=210; for(let i=-1;i<VW/tw+2;i++){ const x=i*tw-(off%tw)+50; drawDeadTree(x,64+((i*53)%46)); }
    drawMotes(acc,'up',26);
  } else if(idx===1){ // SUNKEN GROVE — big sunken ships, swaying kelp, god-rays, bubbles
    drawGodRays();
    const sw=780; for(let i=-1;i<VW/sw+2;i++){ const x=i*sw-(off%sw)+160; drawShip(x,GY-46); }
    ctx.fillStyle='rgba(30,80,46,0.62)'; const kw=150; for(let i=-1;i<VW/kw+2;i++){ const x=i*kw-((runDist*0.2)%kw)+20; drawKelp(x,74+((i*41)%72)); }
    drawMotes('#cfeede','up',28);
  } else if(idx===2){ // ASHEN REACH — broken pillar skyline, dense falling ash
    ctx.fillStyle='rgba(28,20,28,0.72)'; const pw=160; for(let i=-1;i<VW/pw+2;i++){ const x=i*pw-(off%pw)+30; drawPillar(x,120+((i*67)%160)); }
    drawMotes(acc,'down',34);
  } else { // THE STILLNESS — pale void-moon, twinkling stars, drifting monoliths
    const m=ctx.createRadialGradient(VW*0.72,140,10,VW*0.72,140,155); m.addColorStop(0,'rgba(228,218,255,0.5)'); m.addColorStop(1,'rgba(228,218,255,0)');
    ctx.fillStyle=m; ctx.beginPath(); ctx.arc(VW*0.72,140,155,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle='#fff';
    for(let i=0;i<42;i++){ const sx=(i*131)%VW, sy=(i*71)%(GY-60)+20; ctx.globalAlpha=0.25+0.55*Math.abs(Math.sin(runDist*0.01+i*1.7)); ctx.fillRect(sx,sy,1.7,1.7); } ctx.restore();
    ctx.fillStyle='rgba(200,190,255,0.55)'; const fw=340; for(let i=-1;i<VW/fw+2;i++){ const x=i*fw-(off%fw)+90; const yy=100+((i*97)%180)+Math.sin(runDist*0.002+i)*12; drawSlab(x,yy,90+((i*31)%70)); } } }

/* ---- skins & upgrades ---- */
const SKINS={ ember:{name:'Ember (default)',cost:0,wick:null,glow:null},
  verdant:{name:'Verdant',cost:120,wick:'#eaffe9',glow:'#6ee08a'},
  ashlight:{name:'Ashlight',cost:260,wick:'#ffffff',glow:'#bcd0e0'},
  violet:{name:'Violet Wane',cost:450,wick:'#f4eaff',glow:'#b07aff'},
  gold:{name:'Goldflame',cost:800,wick:'#fff3c0',glow:'#ffc040'} };
const UPG={ spark:{name:'Spark — head start',max:5,desc:'+40 m head start per level',cost:l=>60+l*70},
  magnet:{name:'Lodestone — magnet',max:4,desc:'+1.5 s magnet duration per level',cost:l=>90+l*90},
  shield:{name:'Emberguard — start shield',max:2,desc:'Begin each run with +1 shield',cost:l=>240+l*240},
  focus:{name:'Focus — multiplier',max:4,desc:'Higher start & slower decay',cost:l=>120+l*120} };

/* ---- state ---- */
let state='title', aspect='bloom';
let runDist=0, runTime=0, runSpeed=T.baseSpeed, trueM=0, biomeIdx=0;
let meters=0, mult=1, comboGain=0.18, combo=0, flowT=0, streak=0, nearMiss=0, best=false; const FLOW_MAX=3;
let flash=0, shake=0, sawGap=false, deathT=0, areaCard=null, missionFlash=0, levelFlash=0, floats=[], hitstop=0, slowT=0;
let embersRun=0, magnetT=0, overdriveT=0, shield=0, magnetExtra=0;
const p={ wx:ANCHOR,y:GY,vy:0,onGround:true,coyote:0,jumpBuf:0,jumpHeld:false,cutDone:true,run:0 };
let segs=[], genX=0, lastAspect='bloom', needRest=false, sincePower=0;
let pickups=[], particles=[];
const rnd=(a,b)=>a+Math.random()*(b-a);
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---- records / wallet / progression (localStorage) ---- */
const RKEY='emberwane-run-records-v2';
let rec={ bestDist:0,bestTime:0,bestStreak:0,total:0,dayKey:'',dayBest:0,pace:[],
  embers:0, level:1, missions:[], skin:'ember', skins:['ember'], upgrades:{spark:0,magnet:0,shield:0,focus:0} };
function loadRec(){ try{ const r=JSON.parse(localStorage.getItem(RKEY)); if(r){ rec=Object.assign(rec,r);
  rec.upgrades=Object.assign({spark:0,magnet:0,shield:0,focus:0},rec.upgrades||{}); if(!rec.skins||!rec.skins.length)rec.skins=['ember']; } }catch(e){} }
function saveRec(){ try{ localStorage.setItem(RKEY,JSON.stringify(rec)); }catch(e){} }
function today(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
loadRec();

/* ---- missions ---- */
const MTYPES=[
 {k:'flips', scope:'cum', base:25, per:12, txt:t=>'Flip '+t+' times'},
 {k:'dist',  scope:'run', base:300,per:140,txt:t=>'Reach '+t+' m in one run'},
 {k:'embers',scope:'cum', base:60, per:35, txt:t=>'Collect '+t+' embers'},
 {k:'clutch',scope:'cum', base:8,  per:5,  txt:t=>'Pull off '+t+' clutch saves'} ];
function mdef(k){ return MTYPES.find(m=>m.k===k); }
function genMissions(){ rec.missions=shuffle(MTYPES).slice(0,3).map(m=>({k:m.k,scope:m.scope,target:m.base+m.per*(rec.level-1),prog:0,done:false})); }
if(!rec.missions||!rec.missions.length) genMissions();
function mprog(k,n){ for(const m of rec.missions){ if(m.k===k&&!m.done){ m.prog+=n; if(m.prog>=m.target){m.done=true;missionFlash=1.4;sfx('mission');} } } checkLevel(); }
function mset(k,v){ for(const m of rec.missions){ if(m.k===k&&!m.done){ if(v>m.prog)m.prog=v; if(m.prog>=m.target){m.done=true;missionFlash=1.4;sfx('mission');} } } checkLevel(); }
function checkLevel(){ if(rec.missions.length&&rec.missions.every(m=>m.done)){ rec.level++; const rw=40*rec.level; rec.embers+=rw; levelFlash=2.4; sfx('level'); genMissions(); saveRec(); } }

/* ---- pace ghost ---- */
let paceRec=[], paceAcc=0;
function paceDistAt(t){ const a=rec.pace; if(!a||a.length<2)return null;
  if(t<=a[0].t)return a[0].d; if(t>=a[a.length-1].t)return a[a.length-1].d;
  for(let i=1;i<a.length;i++){ if(a[i].t>=t){ const q=a[i-1],w=a[i]; return q.d+(w.d-q.d)*((t-q.t)/(w.t-q.t)); } } return null; }

/* ---- terrain (two-layer) + obstacles + pickups -----------------------
   seg.kind: rest | hole(jump) | pit(flip) | pitceil(flip, no jump) | spike(jump over)
   Every special is followed by a both-solid rest, so a safe flip is
   always available and the course is guaranteed solvable.            */
function reachNow(){ const air=2*T.jumpV/T.G; return runSpeed*air*0.92; }
function pushSeg(w,b,c,extra){ const s=Object.assign({x0:genX,x1:genX+w,bloom:b,cinder:c,kind:'rest'},extra||{}); segs.push(s); genX+=w; return s; }
function pushEmber(x,y){ pickups.push({wx:x,y:y,kind:'ember',got:false,bob:Math.random()*6}); }
function pushPower(x,y,kind){ pickups.push({wx:x,y:y,kind:kind,got:false,bob:Math.random()*6}); }
function randPower(){ const r=Math.random(); return r<0.45?'magnet':r<0.8?'shield':'overdrive'; }
function spawnPickups(s){
  if(s.kind==='hole'){ const n=3; for(let i=0;i<n;i++){ const f=(i+1)/(n+1); pushEmber(s.x0+(s.x1-s.x0)*f, GY-58-Math.sin(f*Math.PI)*62); } return; }
  const w=s.x1-s.x0; if(w<70) return;
  const r=Math.random();
  if(s.kind==='rest' && w>250 && r<0.42){          // ~40% of rests reward a jump
    if(r<0.20){ const n=5, cx0=s.x0+w*0.25, span=w*0.5;     // a jump arc you trace mid-air
      for(let i=0;i<n;i++){ const f=i/(n-1); pushEmber(cx0+span*f, GY-30-Math.sin(f*Math.PI)*86); } }
    else { const cx=s.x0+w*0.5;                              // a floating high cluster — jump straight up
      pushEmber(cx-24,GY-86); pushEmber(cx,GY-104); pushEmber(cx+24,GY-86);
      pushEmber(cx-78,GY-28); pushEmber(cx+78,GY-28); }
  } else {                                          // easy ground line (baseline)
    for(let x=s.x0+34;x<s.x1-22;x+=48){
      if(s.kind==='spike'&&Math.abs(x-s.spikeX)<42)continue;
      if(s.kind==='wall'&&Math.abs(x-s.wallX)<30)continue;
      pushEmber(x, GY-28); }
  }
}
function genAhead(){
  while(genX < runDist+VW+700){
    const d=Math.min(1,runDist/16000);
    if(needRest){ const s=pushSeg(rnd(330,430),true,true,{kind:'rest'}); needRest=false; spawnPickups(s);   // generous landing zone after every obstacle
      sincePower++; if(sincePower>5 && runDist>700 && Math.random()<0.5){ sincePower=0; pushPower(s.x0+(s.x1-s.x0)/2, GY-40, randPower()); } continue; }
    const r=Math.random();
    const pPlain=0.30-0.14*d, pGap=0.20+0.16*d;
    const types=['hole','pit']; if(biomeIdx>=1){types.push('spike');types.push('wall');} if(biomeIdx>=2)types.push('pitceil');
    if(r<pPlain){ const s=pushSeg(rnd(220,320-120*d),true,true,{kind:'rest'}); spawnPickups(s); }
    else if(r<pPlain+pGap){ const w=Math.min(reachNow()*0.45,reachNow()*0.5); const s=pushSeg(Math.max(90,w),false,false,{kind:'hole'}); spawnPickups(s); needRest=true; }
    else { const k=types[Math.floor(Math.random()*types.length)];
      if(k==='spike'){ const w=rnd(220,300); const s=pushSeg(w,true,true,{kind:'spike',spikeX:genX+w/2,spikeW:30}); spawnPickups(s); needRest=true; }
      else if(k==='wall'){ const w=rnd(210,280); const wa=Math.random()<0.5?'bloom':'cinder';
        const s=pushSeg(w,true,true,{kind:'wall',wallAspect:wa,wallX:genX+w*0.6,wallW:22}); spawnPickups(s); needRest=true; }
      else { lastAspect=lastAspect==='bloom'?'cinder':'bloom';
        const w= k==='pitceil'? rnd(150,210) : rnd(150,260-60*d);
        const s=pushSeg(w, lastAspect==='bloom', lastAspect==='cinder', k==='pitceil'?{kind:'pitceil',ceilY:330}:{kind:'pit'});
        spawnPickups(s); needRest=true; } }
  }
  if(segs.length>160) segs=segs.slice(segs.length-130);
  if(pickups.length>400) pickups=pickups.filter(k=>k.wx>runDist-120);
}
function segAt(wx){ for(let i=segs.length-1;i>=0;i--){ const s=segs[i]; if(wx>=s.x0&&wx<s.x1)return s; } return null; }
function solidAt(wx){ const s=segAt(wx); return s? (aspect==='bloom'?s.bloom:s.cinder):false; }
function bothGapAt(wx){ const s=segAt(wx); return s? (!s.bloom&&!s.cinder):false; }

/* ---- run lifecycle ---- */
function applyUpgrades(){ const u=rec.upgrades;
  meters = u.spark*40; magnetExtra=u.magnet*1.5; shield=u.shield;
  comboGain = 0.18*(1+u.focus*0.12); mult=1; combo=0; flowT=0; }
function startRun(){ state='run'; aspect='bloom'; runDist=0; runTime=0; runSpeed=T.baseSpeed; trueM=0; biomeIdx=0;
  streak=0; nearMiss=0; best=false; flash=0; shake=0; sawGap=false; deathT=0; areaCard=null; embersRun=0; magnetT=0; overdriveT=0;
  combo=0; flowT=0; floats=[]; hitstop=0; slowT=0;
  applyUpgrades();
  p.wx=ANCHOR; p.y=GY; p.vy=0; p.onGround=true; p.coyote=0; p.jumpBuf=0; p.jumpHeld=false; p.cutDone=true; p.run=0;
  segs=[]; genX=0; lastAspect='bloom'; needRest=false; sincePower=0; pickups=[]; particles=[];
  pushSeg(1200,true,true,{kind:'rest'}); genAhead(); setDrone();
  paceRec=[{t:0,d:0}]; paceAcc=0; syncShopBtn(); }
function shieldSave(){ shield--; flash=0.4; shake=8; sfx('power'); combo=0; flowT=0;
  // pop onto the next safe ground in whichever aspect is solid there
  let target=null; for(const s of segs){ if(s.x1<=p.wx)continue; if(s.bloom||s.cinder){ target=s; break; } }
  if(target){ if(aspect==='bloom'?!target.bloom:!target.cinder) aspect= target.bloom?'bloom':'cinder';
    runDist=target.x0-ANCHOR+8; p.wx=runDist+ANCHOR; }
  p.y=GY-2; p.vy=-260; p.onGround=false; p.coyote=T.coyote;
  for(let i=0;i<18;i++)particles.push({x:ANCHOR,y:GY-16,vx:rnd(-160,160),vy:rnd(-220,-20),life:.6,max:.6,r:rnd(2,3),c:'#bdf5e8',g:300}); }
function die(){ if(state!=='run')return; state='dead'; deathT=0; shake=14; sfx('die'); combo=0; flowT=0;
  const Pg=biome()[aspect];
  for(let i=0;i<34;i++)particles.push({x:ANCHOR,y:p.y-18,vx:rnd(-180,120),vy:rnd(-260,-40),life:.9,max:.9,r:rnd(2,4),c:Pg.glow,g:520});
  const dm=Math.floor(meters); rec.total+=dm; rec.embers+=embersRun;
  if(dm>rec.bestDist){ rec.bestDist=dm; best=true; rec.pace=paceRec.slice(); sfx('best'); }
  if(runTime>rec.bestTime) rec.bestTime=runTime;
  if(streak>rec.bestStreak) rec.bestStreak=streak;
  if(rec.dayKey!==today()){ rec.dayKey=today(); rec.dayBest=0; }
  if(dm>rec.dayBest) rec.dayBest=dm;
  saveRec(); syncShopBtn(); }

/* ---- input ---- */
function flip(){ if(state!=='run')return;
  const before=solidAt(p.wx); aspect=aspect==='bloom'?'cinder':'bloom'; const after=solidAt(p.wx);
  flash=0.26; setDrone(); sfx('flip'); mprog('flips',1);
  const Pg=biome()[aspect];
  for(let i=0;i<14;i++)particles.push({x:ANCHOR,y:p.y-16,vx:rnd(-90,90),vy:rnd(-120,40),life:.4,max:.4,r:rnd(1,3),c:Pg.glow,g:120});
  if(!before&&after){ nearMiss++; mprog('clutch',1);
    const perfect=(p.y-GY)<8; if(perfect)pushFloat('PERFECT FLIP','#bdf5e8'); addCombo(perfect);
    for(let i=0;i<10;i++)particles.push({x:ANCHOR,y:p.y-16,vx:rnd(-140,140),vy:rnd(-180,-20),life:.5,max:.5,r:rnd(1,3),c:'#fff',g:60}); } }
function jumpPress(){ if(state!=='run')return; p.jumpBuf=T.buffer; p.jumpHeld=true; }
function jumpRelease(){ p.jumpHeld=false; }
function tapStart(){ initAudio(); if(state==='title'||(state==='dead'&&deathT>=0.4)) startRun(); }
cv.addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio();
  if(state!=='run'){ tapStart(); return; }
  const r=cv.getBoundingClientRect(); const sx=(e.clientX-r.left)/r.width;
  if(sx<0.5) flip(); else jumpPress(); });
cv.addEventListener('pointerup',e=>{ e.preventDefault(); jumpRelease(); });
addEventListener('keydown',e=>{ if(e.repeat)return; initAudio();
  if(e.code==='KeyM'){ muted=!muted; if(master)master.gain.value=muted?0:0.3; return; }
  if(state!=='run'){ if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowUp'){e.preventDefault();tapStart();} return; }
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); jumpPress(); }
  else if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='KeyT'||e.code==='ArrowLeft'){ e.preventDefault(); flip(); } });
addEventListener('keyup',e=>{ if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') jumpRelease(); });
addEventListener('blur',()=>{ p.jumpHeld=false; });

/* ---- pickups update ---- */
function collectPickups(dt,ods){ const magnet=magnetT>0||ods;
  const yc=p.y-16;   // collect from Wick's chest, not his feet
  for(const k of pickups){ if(k.got)continue; k.bob+=dt;
    let dx=k.wx-p.wx, dy=k.y-yc, dist=Math.hypot(dx,dy);
    if(k.kind==='ember'&&magnet&&dist<210){ k.wx-=dx*Math.min(1,dt*9); k.y-=dy*Math.min(1,dt*9); dx=k.wx-p.wx;dy=k.y-yc;dist=Math.hypot(dx,dy); }
    const cr=k.kind==='ember'?(ods?46:26):32;
    if(dist<cr){ k.got=true;
      if(k.kind==='ember'){ embersRun++; mprog('embers',1); sfx('ember');
        for(let i=0;i<6;i++)particles.push({x:ANCHOR+dx,y:p.y+dy,vx:rnd(-70,70),vy:rnd(-90,-10),life:.4,max:.4,r:rnd(1,2),c:'#ffd9a0',g:120}); }
      else { activatePower(k.kind); flash=0.3;
        for(let i=0;i<16;i++)particles.push({x:ANCHOR+dx,y:p.y+dy,vx:rnd(-150,150),vy:rnd(-160,40),life:.6,max:.6,r:rnd(2,3),c:powColor(k.kind),g:120}); } }
  }
  pickups=pickups.filter(k=>!k.got && k.wx>runDist-120);
}
function activatePower(kind){ sfx('power');
  if(kind==='magnet') magnetT=T.magnetDur+magnetExtra;
  else if(kind==='shield') shield++;
  else if(kind==='overdrive') overdriveT=T.odDur; }
function powColor(k){ return k==='magnet'?'#bda0ff':k==='shield'?'#9dffd0':'#ffb030'; }

/* ---- mastery: perfect timing + combo flow + juice ---- */
function pushFloat(txt,c,size){ floats.push({txt:txt,c:c||'#fff',size:size||18,x:ANCHOR+rnd(-12,12),y:p.y-52,vy:-55,life:1,max:1}); }
function nextHole(){ for(const s of segs){ if(s.kind==='hole'&&s.x1>p.wx) return s; } return null; }
function addCombo(perfect){ combo++; streak++; flowT=FLOW_MAX;
  if(perfect){ const bonus=12+combo*2; meters+=bonus; shake=Math.max(shake,6); flash=Math.max(flash,0.20); sfx('perfect');
    pushFloat('+'+Math.round(bonus)+'m','#ffe9b0',22);                       // NO time-freeze — visuals + sound only
    for(let i=0;i<24;i++)particles.push({x:ANCHOR,y:p.y-16,vx:rnd(-240,240),vy:rnd(-260,-20),life:.55,max:.55,r:rnd(2,3.5),c:i%2?'#fff':'#ffe9b0',g:140}); }
  else sfx('clean');
  if(combo>=2 && combo%10===0) pushFloat(combo+'x FLOW!','#9dffd0',26); }

/* ---- update ---- */
function update(dt){
  for(const pa of particles){ pa.vy+=pa.g*dt; pa.x+=pa.vx*dt; pa.y+=pa.vy*dt; pa.life-=dt; }
  particles=particles.filter(p=>p.life>0);
  if(flash>0)flash-=dt; if(shake>0)shake=Math.max(0,shake-30*dt);
  if(missionFlash>0)missionFlash-=dt; if(levelFlash>0)levelFlash-=dt;
  if(areaCard){ areaCard.t+=dt; if(areaCard.t>areaCard.dur)areaCard=null; }
  if(state==='dead'){ deathT+=dt; return; }
  if(state!=='run')return;

  const ods=overdriveT>0;
  runTime+=dt;
  runSpeed=(T.baseSpeed+Math.min(T.maxAdd,runDist/T.rampPer))*(ods?T.odSpeed:1);
  runDist+=runSpeed*dt; p.wx=runDist+ANCHOR; p.run+=dt*runSpeed*0.02;
  trueM=runDist/PPM; const nb=Math.min(BIOMES.length-1,Math.floor(trueM/T.biomeM));
  if(nb!==biomeIdx){ biomeIdx=nb; areaCard={name:biome().name,t:0,dur:2.6}; setDrone(); }
  genAhead();
  paceAcc+=dt; if(paceAcc>=0.1){ paceAcc=0; paceRec.push({t:+runTime.toFixed(2),d:Math.floor(meters)}); if(paceRec.length>4000)paceRec.shift(); }
  if(magnetT>0)magnetT-=dt;
  if(overdriveT>0){ overdriveT-=dt; if(overdriveT<=0 && !solidAt(p.wx)) overdriveT=0.03; }  // never end while over a pit

  if(ods){ // OVERDRIVE: invincible ride — you can still JUMP, and you never fall into pits
    if(p.jumpBuf>0){ p.jumpBuf-=dt; if(p.onGround){ p.vy=-T.jumpV; p.onGround=false; p.cutDone=false; sfx('jump'); } }
    if(p.onGround){ p.y=GY; p.vy=0; }
    else { p.vy+=T.G*dt; if(!p.jumpHeld&&p.vy<0&&!p.cutDone){ p.vy*=T.cut; p.cutDone=true; } p.y+=p.vy*dt;
      if(p.vy>0&&p.y>=GY){ p.y=GY; p.vy=0; p.onGround=true; p.coyote=T.coyote; } } }
  else {
    const solid=solidAt(p.wx);
    if(p.onGround){ if(solid){ p.y=GY; p.vy=0; p.coyote=T.coyote; } else p.onGround=false; }
    if(!p.onGround){ p.coyote-=dt; p.vy+=T.G*dt;
      if(!p.jumpHeld&&p.vy<0&&!p.cutDone){ p.vy*=T.cut; p.cutDone=true; }
      if(bothGapAt(p.wx)) sawGap=true;
      const prevY=p.y, ny=p.y+p.vy*dt;
      // land ONLY when descending onto the platform top (within a small snap) — fall too deep and you die
      if(p.vy>0 && solid && ny>=GY && prevY<=GY+30){ p.y=GY; p.vy=0; p.onGround=true; p.coyote=T.coyote; sfx('land');
        if(sawGap){ nearMiss++; mprog('clutch',1); const ls=segAt(p.wx); const perfect=ls?(p.wx-ls.x0)<18:false;
          if(perfect)pushFloat('PERFECT LAND','#9dffd0'); addCombo(perfect); } sawGap=false; }
      else p.y=ny; }
    if(p.jumpBuf>0){ p.jumpBuf-=dt; if(p.onGround||p.coyote>0){ p.vy=-T.jumpV; p.onGround=false; p.coyote=0; p.jumpBuf=0; p.cutDone=false; sfx('jump');
      const nh=nextHole(); if(nh){ const gap=nh.x0-p.wx; if(gap<14&&gap>-10){ pushFloat('PERFECT JUMP','#ffd9a0'); addCombo(true); } } } }
    // obstacle collisions
    const s=segAt(p.wx);
    if(s){ if(s.kind==='spike'&&p.onGround&&Math.abs(p.wx-s.spikeX)<(s.spikeW/2+8)) die();
      else if(s.kind==='wall'&&aspect===s.wallAspect&&Math.abs(p.wx-s.wallX)<(s.wallW/2+8)) die();
      else if(s.ceilY!=null&&(p.y-30)<s.ceilY&&p.wx>s.x0+4&&p.wx<s.x1-4) die(); }
  }

  collectPickups(dt,ods);
  if(flowT>0){ flowT-=dt; if(flowT<=0&&combo>0)combo=0; }
  mult = Math.min(T.multMax, 1 + combo*comboGain);
  meters += (runSpeed*dt/PPM)*mult;
  for(const f of floats){ f.y+=f.vy*dt; f.vy*=0.94; f.life-=dt; } floats=floats.filter(f=>f.life>0);
  mset('dist',Math.floor(meters));
  if(!ods && p.y>DEATH_Y){ if(shield>0) shieldSave(); else die(); }
}

/* ---- render ---- */
function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawBg(P){ const g=ctx.createLinearGradient(0,0,0,VH); g.addColorStop(0,P.sky0); g.addColorStop(1,P.sky1);
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  drawBiomeProps(P);
  ctx.fillStyle=P.far; const off=(runDist*0.25)%240;
  for(let i=-1;i<VW/240+2;i++){ const bx=i*240-off; ctx.beginPath(); ctx.moveTo(bx,GY); ctx.quadraticCurveTo(bx+120,GY-90,bx+240,GY); ctx.lineTo(bx+240,VH); ctx.lineTo(bx,VH); ctx.fill(); } }
function drawGround(P,IN){
  for(const s of segs){ const sx=s.x0-runDist, ex=s.x1-runDist; if(ex<-40||sx>VW+40)continue; const w=ex-sx;
    const activeSolid=aspect==='bloom'?s.bloom:s.cinder, otherSolid=aspect==='bloom'?s.cinder:s.bloom;
    if(activeSolid){ const g=ctx.createLinearGradient(0,GY-6,0,VH); g.addColorStop(0,P.gTop); g.addColorStop(0.4,P.gBod); g.addColorStop(1,P.gBod);
      ctx.fillStyle=g; ctx.fillRect(sx,GY,w,VH-GY);
      ctx.fillStyle=P.gTop; ctx.fillRect(sx,GY-5,w,6);                       // crust
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(sx,GY-5,w,2);     // highlight
      ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(sx,GY+1,w,3);          // under-crust shadow
      const acc=BIOME_ACC[Math.min(BIOMES.length-1,biomeIdx)]; ctx.fillStyle=acc;
      for(let gx=Math.ceil(sx/24)*24; gx<ex; gx+=24){ const hh=2+((Math.floor(gx/24)*13)%4);
        if(biomeIdx===0){ ctx.globalAlpha=0.65; ctx.fillRect(gx,GY-5-hh,2,hh); }                                  // ember specks
        else { ctx.globalAlpha=0.55; ctx.beginPath(); ctx.moveTo(gx-3,GY-4); ctx.lineTo(gx,GY-7-hh); ctx.lineTo(gx+3,GY-4); ctx.closePath(); ctx.fill(); } }  // tufts
      ctx.globalAlpha=1; }
    else { // gap in the active aspect — dark abyss so pits read as danger over the busy background
      const ag=ctx.createLinearGradient(0,GY,0,VH); ag.addColorStop(0,'rgba(0,0,0,0)'); ag.addColorStop(0.35,'rgba(2,1,6,0.55)'); ag.addColorStop(1,'rgba(2,1,6,0.86)');
      ctx.fillStyle=ag; ctx.fillRect(sx,GY,w,VH-GY);
      if(otherSolid){ ctx.fillStyle=IN.ghost; ctx.fillRect(sx,GY,w,VH-GY);
        ctx.strokeStyle=IN.ghost; ctx.setLineDash([6,6]); ctx.strokeRect(sx+1,GY+1,w-2,VH-GY-2); ctx.setLineDash([]); } }
    if(s.ceilY!=null){ const cg=ctx.createLinearGradient(0,0,0,s.ceilY); cg.addColorStop(0,P.gBod); cg.addColorStop(1,P.gTop);
      ctx.fillStyle=cg; ctx.fillRect(sx,0,w,s.ceilY); ctx.fillStyle=P.gTop;
      ctx.beginPath(); for(let xx=sx; xx<sx+w; xx+=16){ ctx.moveTo(xx,s.ceilY); ctx.lineTo(xx+8,s.ceilY+12); ctx.lineTo(xx+16,s.ceilY); } ctx.fill(); }
    if(s.kind==='spike'&&activeSolid){ const cx=s.spikeX-runDist;
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.fillStyle='rgba(255,70,40,0.4)'; ctx.beginPath(); ctx.arc(cx,GY-14,22,0,Math.PI*2); ctx.fill(); ctx.restore();
      for(let k=-1;k<=1;k++){ const sxk=cx+k*13; ctx.fillStyle='#e8483a'; ctx.beginPath(); ctx.moveTo(sxk-8,GY); ctx.lineTo(sxk,GY-31); ctx.lineTo(sxk+8,GY); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#ffd0c0'; ctx.beginPath(); ctx.moveTo(sxk-3,GY); ctx.lineTo(sxk,GY-24); ctx.lineTo(sxk+2,GY); ctx.fill(); } }
    if(s.kind==='wall'){ const cx=s.wallX-runDist;
      if(aspect===s.wallAspect){ const wg=ctx.createLinearGradient(cx,0,cx,GY); wg.addColorStop(0,'rgba(255,80,40,0.12)'); wg.addColorStop(1,'rgba(255,120,40,0.9)');
        ctx.fillStyle=wg; ctx.fillRect(cx-9,0,18,GY);
        ctx.fillStyle='#ff7a2a'; for(let yy=6;yy<GY;yy+=22){ ctx.beginPath(); ctx.moveTo(cx-9,yy); ctx.lineTo(cx-19,yy+8); ctx.lineTo(cx-9,yy+16); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(cx+9,yy); ctx.lineTo(cx+19,yy+8); ctx.lineTo(cx+9,yy+16); ctx.closePath(); ctx.fill(); } }
      else { ctx.fillStyle='rgba(255,130,90,0.14)'; ctx.fillRect(cx-8,0,16,GY); ctx.strokeStyle='rgba(255,140,90,0.32)'; ctx.setLineDash([5,8]); ctx.strokeRect(cx-8,2,16,GY-3); ctx.setLineDash([]); } }
  } }
function drawPickups(){ for(const k of pickups){ const x=k.wx-runDist; if(x<-30||x>VW+30)continue; const y=k.y+Math.sin(k.bob*3)*3;
    if(k.kind==='ember'){ ctx.globalCompositeOperation='lighter'; ctx.fillStyle='#ffcf6a'; ctx.beginPath(); ctx.arc(x,y,3.4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=.5; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; }
    else { const c=powColor(k.kind); ctx.fillStyle='rgba(10,8,16,.7)'; ctx.strokeStyle=c; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=c; ctx.font='bold 14px Trebuchet MS'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(k.kind==='magnet'?'M':k.kind==='shield'?'S':'O',x,y+1); ctx.textBaseline='alphabetic'; } } }
function drawWick(x,y,P,ghost){ const sk=SKINS[rec.skin]||SKINS.ember; const wc=(sk.wick)||P.wick, gc=(sk.glow)||P.glow;
  ctx.save(); ctx.translate(x,y); const t=p.run; const bob=state==='run'?Math.sin(t*4)*2:0;
  ctx.globalCompositeOperation='lighter'; const gg=ctx.createRadialGradient(0,-16,2,0,-16,34);
  gg.addColorStop(0,gc); gg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,-16,34,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=wc; rrect(-9,-34+bob,18,30,7); ctx.fill();
  ctx.fillStyle=gc; ctx.beginPath(); ctx.arc(0,-34+bob,6,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=wc; ctx.lineWidth=3; ctx.lineCap='round'; const ph=state==='run'?t*8:0;
  ctx.beginPath(); ctx.moveTo(-3,-6+bob); ctx.lineTo(-3+Math.cos(ph)*6,Math.abs(Math.sin(ph))*-2);
  ctx.moveTo(3,-6+bob); ctx.lineTo(3+Math.cos(ph+Math.PI)*6,Math.abs(Math.sin(ph+Math.PI))*-2); ctx.stroke();
  if(shield>0&&!ghost){ ctx.strokeStyle='rgba(157,255,208,.7)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-16,26,0,Math.PI*2); ctx.stroke(); }
  ctx.restore(); }
function drawParticles(){ for(const pa of particles){ ctx.globalAlpha=Math.max(0,pa.life/pa.max); ctx.fillStyle=pa.c; ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; }
function drawFloats(){ ctx.textAlign='center'; for(const f of floats){ ctx.globalAlpha=Math.max(0,Math.min(1,f.life/f.max)); ctx.fillStyle=f.c; ctx.font='bold '+f.size+'px Trebuchet MS'; ctx.shadowColor='#000'; ctx.shadowBlur=6; ctx.fillText(f.txt,f.x,f.y); ctx.shadowBlur=0; } ctx.globalAlpha=1; }
function drawPaceGhost(IN){ const pd=paceDistAt(runTime); if(pd==null)return; const gx=ANCHOR+(pd-runDist); if(gx<-30||gx>VW+30)return;
  ctx.globalAlpha=0.28; drawWick(gx,GY,biome()[aspect],true); ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,.4)'; ctx.font='10px Trebuchet MS'; ctx.textAlign='center'; ctx.fillText('best',gx,GY+18); }

function drawHUD(){ const dm=Math.floor(meters);
  ctx.textAlign='center'; ctx.fillStyle='#f4ead8'; ctx.font='bold 46px Trebuchet MS'; ctx.shadowColor='#000'; ctx.shadowBlur=8;
  ctx.fillText(dm+' m',VW/2,56); ctx.shadowBlur=0;
  ctx.font='bold 16px Trebuchet MS';
  const mc=mult>=4?'#ff5a3a':mult>=2.5?'#ff9a4d':mult>=1.6?'#ffd9a0':'#9a93a8';
  ctx.fillStyle='#bdf5e8'; ctx.fillText('⏱ '+runTime.toFixed(1)+'s',VW/2-120,80);
  ctx.fillStyle=mc; ctx.fillText('×'+mult.toFixed(1),VW/2,80);
  ctx.fillStyle='#ff9a4d'; ctx.fillText('↺ '+streak,VW/2+110,80);
  // combo flow meter — the heart of the skill loop
  if(combo>=2){ const fp=Math.max(0,flowT/FLOW_MAX); const cc=combo>=20?'#ff5a3a':combo>=10?'#ff9a4d':'#ffd9a0';
    ctx.fillStyle=cc; ctx.font='bold '+(26+Math.min(14,combo*0.6))+'px Trebuchet MS'; ctx.fillText(combo+'x  FLOW',VW/2,128);
    ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(VW/2-70,138,140,5); ctx.fillStyle=cc; ctx.fillRect(VW/2-70,138,140*fp,5); }
  // embers
  ctx.textAlign='left'; ctx.fillStyle='#ffcf6a'; ctx.font='bold 18px Trebuchet MS'; ctx.fillText('✦ '+embersRun,16,28);
  // biome
  ctx.textAlign='right'; ctx.fillStyle='rgba(244,234,216,.5)'; ctx.font='12px Trebuchet MS'; ctx.fillText(biome().name+(rec.bestDist?'   ·   BEST '+rec.bestDist+'m':''),VW-14,24);
  // power-up timers
  let py=44; ctx.textAlign='right';
  if(magnetT>0){ ctx.fillStyle='#bda0ff'; ctx.fillText('M '+magnetT.toFixed(1)+'s',VW-14,py); py+=18; }
  if(overdriveT>0){ ctx.fillStyle='#ffb030'; ctx.fillText('OVERDRIVE '+overdriveT.toFixed(1)+'s',VW-14,py); py+=18; }
  if(shield>0){ ctx.fillStyle='#9dffd0'; ctx.fillText('🛡 '+shield,VW-14,py); }
  if(missionFlash>0){ ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,missionFlash); ctx.fillStyle='#ffd9a0'; ctx.font='bold 18px Trebuchet MS'; ctx.fillText('MISSION COMPLETE',VW/2,120); ctx.globalAlpha=1; }
  if(levelFlash>0){ ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,levelFlash); ctx.fillStyle='#9dffd0'; ctx.font='bold 26px Trebuchet MS'; ctx.fillText('LEVEL '+rec.level+'!',VW/2,150); ctx.globalAlpha=1; }
}
function drawMissions(cx,cy){ ctx.textAlign='center'; ctx.fillStyle='#9a93a8'; ctx.font='12px Trebuchet MS'; ctx.fillText('— MISSIONS (Lv '+rec.level+') —',cx,cy);
  let y=cy+20; for(const m of rec.missions){ const def=mdef(m.k); const txt=def.txt(m.target); const pr=Math.min(1,m.prog/m.target);
    ctx.fillStyle=m.done?'#9dffd0':'#cfc7d6'; ctx.font='13px Trebuchet MS'; ctx.fillText((m.done?'✓ ':'')+txt+'   '+Math.min(m.prog,m.target)+'/'+m.target,cx,y);
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(cx-110,y+5,220,4); ctx.fillStyle=m.done?'#9dffd0':'#ffd9a0'; ctx.fillRect(cx-110,y+5,220*pr,4); y+=30; } }
function drawTitle(){ ctx.textAlign='center';
  ctx.fillStyle='#ffb070'; ctx.font='bold 60px Trebuchet MS'; ctx.shadowColor='#ff7a2a'; ctx.shadowBlur=24; ctx.fillText('EMBER RUN',VW/2,118); ctx.shadowBlur=0;
  ctx.fillStyle='#cfc7d6'; ctx.font='15px Trebuchet MS'; ctx.fillText('Flip the world. Jump the holes. Go far.',VW/2,150);
  ctx.fillStyle='#9dffd0'; ctx.font='bold 20px Trebuchet MS'; ctx.fillText('TAP TO RUN',VW/2,190);
  ctx.fillStyle='#9a93a8'; ctx.font='12px Trebuchet MS'; ctx.fillText('LEFT = FLIP   ·   RIGHT = JUMP (hold = higher)',VW/2,214);
  ctx.fillStyle='#ffcf6a'; ctx.font='14px Trebuchet MS'; ctx.fillText('✦ '+rec.embers+' embers'+(rec.bestDist?'    ·    Best '+rec.bestDist+' m':''),VW/2,242);
  drawMissions(VW/2,278); }
function drawDead(){ ctx.fillStyle='rgba(5,4,10,.6)'; ctx.fillRect(0,0,VW,VH); ctx.textAlign='center';
  ctx.fillStyle='#9a93a8'; ctx.font='12px Trebuchet MS'; ctx.fillText('DISTANCE',VW/2,70);
  ctx.fillStyle='#bdf5e8'; ctx.font='bold 54px Trebuchet MS'; ctx.fillText(Math.floor(meters)+' m',VW/2,116);
  if(best){ ctx.fillStyle='#ffd9a0'; ctx.font='bold 17px Trebuchet MS'; ctx.fillText('★ NEW BEST ★',VW/2,140); }
  ctx.fillStyle='#ffcf6a'; ctx.font='15px Trebuchet MS'; ctx.fillText('✦ +'+embersRun+' embers   (total '+rec.embers+')',VW/2,166);
  ctx.fillStyle='#cfc7d6'; ctx.font='13px Trebuchet MS'; ctx.fillText('⏱ '+runTime.toFixed(1)+'s    ↺ '+streak+'    '+nearMiss+' clutch    Best '+rec.bestDist+' m',VW/2,190);
  drawMissions(VW/2,222);
  ctx.fillStyle=deathT>0.4?'#9dffd0':'#5a5a5a'; ctx.font='bold 20px Trebuchet MS'; ctx.fillText('TAP TO RUN AGAIN',VW/2,VH-40); }
function drawAreaCard(){ if(!areaCard)return; const a=Math.min(1, areaCard.t<0.4?areaCard.t/0.4:(areaCard.dur-areaCard.t)/0.5);
  ctx.globalAlpha=Math.max(0,a); ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 30px Trebuchet MS';
  ctx.shadowColor='#000'; ctx.shadowBlur=12; ctx.fillText(areaCard.name,VW/2,VH/2-40); ctx.shadowBlur=0; ctx.globalAlpha=1; }

function draw(){ const B=biome(); const P=B[aspect]; const IN=B[aspect==='bloom'?'cinder':'bloom'];
  ctx.save(); if(shake>0)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  drawBg(P); drawGround(P,IN); if(state==='run')drawPaceGhost(IN); drawPickups(); drawParticles(); drawWick(ANCHOR,p.y,P,false); drawFloats();
  ctx.restore();
  if(overdriveT>0){ ctx.fillStyle='rgba(255,176,48,'+(0.12+0.06*Math.sin(p.run*40))+')'; ctx.fillRect(0,0,VW,VH); }
  if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+(flash*0.5)+')'; ctx.fillRect(0,0,VW,VH); }
  if(state==='run'){ drawHUD(); drawAreaCard(); }
  if(state==='title') drawTitle();
  if(state==='dead') drawDead();
  ctx.fillStyle='rgba(255,255,255,.25)'; ctx.font='11px Trebuchet MS'; ctx.textAlign='left'; ctx.fillText(muted?'🔇 M':'🔊 M',12,VH-12); }

/* ---- shop UI (DOM) ---- */
let shopOpen=false, shopTab='skins';
function syncShopBtn(){ document.getElementById('openShop').style.display=(state!=='run'&&!shopOpen)?'block':'none'; }
function openShop(){ shopOpen=true; document.getElementById('shop').style.display='flex'; renderShop(); syncShopBtn(); }
function closeShop(){ shopOpen=false; document.getElementById('shop').style.display='none'; syncShopBtn(); }
function renderShop(){ document.getElementById('shopWallet').textContent='✦ '+rec.embers+' embers';
  document.querySelectorAll('#shop .tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===shopTab));
  const rows=document.getElementById('shopRows'); rows.innerHTML='';
  if(shopTab==='skins'){ for(const id in SKINS){ const s=SKINS[id]; const owned=rec.skins.includes(id); const sel=rec.skin===id;
    const row=document.createElement('div'); row.className='srow';
    row.innerHTML='<div class="gem" style="color:'+(s.glow||'#ff7a2a')+';background:'+(s.glow||'#ff7a2a')+'"></div><div class="info"><div class="n">'+s.name+'</div><div class="d">'+(s.cost?('✦ '+s.cost):'free')+'</div></div>';
    const b=document.createElement('button');
    if(sel){ b.textContent='EQUIPPED'; b.className='sel'; }
    else if(owned){ b.textContent='EQUIP'; b.className='owned'; b.onclick=()=>{ rec.skin=id; saveRec(); renderShop(); }; }
    else if(rec.embers>=s.cost){ b.textContent='BUY ✦'+s.cost; b.onclick=()=>{ rec.embers-=s.cost; rec.skins.push(id); rec.skin=id; saveRec(); renderShop(); }; }
    else { b.textContent='✦'+s.cost; b.className='cant'; }
    row.appendChild(b); rows.appendChild(row); } }
  else { for(const id in UPG){ const u=UPG[id]; const lv=rec.upgrades[id]||0; const maxed=lv>=u.max; const cost=u.cost(lv);
    const row=document.createElement('div'); row.className='srow';
    row.innerHTML='<div class="gem" style="color:#9dffd0;background:#9dffd0"></div><div class="info"><div class="n">'+u.name+'  <span style="color:#9a93a8">Lv '+lv+'/'+u.max+'</span></div><div class="d">'+u.desc+'</div></div>';
    const b=document.createElement('button');
    if(maxed){ b.textContent='MAX'; b.className='owned'; }
    else if(rec.embers>=cost){ b.textContent='✦'+cost; b.onclick=()=>{ rec.embers-=cost; rec.upgrades[id]=lv+1; saveRec(); renderShop(); }; }
    else { b.textContent='✦'+cost; b.className='cant'; }
    row.appendChild(b); rows.appendChild(row); } } }
document.getElementById('openShop').onclick=openShop;
document.getElementById('closeShop').onclick=closeShop;
document.querySelectorAll('#shop .tab').forEach(t=>t.onclick=()=>{ shopTab=t.dataset.tab; renderShop(); });

/* ---- loop / fit ---- */
let last=0,acc=0; const STEP=1/120;
function frame(t){ const now=t/1000; let dt=now-last; last=now; if(dt>0.1)dt=0.1;
  acc+=dt; let n=0; while(acc>=STEP&&n<8){ update(STEP); acc-=STEP; n++; } draw(); requestAnimationFrame(frame); }
requestAnimationFrame(t=>{ last=t/1000; frame(t); });
const LOW=(typeof matchMedia!=='undefined')&&matchMedia('(pointer:coarse)').matches;
if(LOW){ document.getElementById('zones').style.display='block'; const rt=document.getElementById('rotate'); if(rt)rt.classList.add('armed'); }
function fit(){ const s=Math.min(innerWidth/VW,innerHeight/VH)*0.985; cv.style.width=(VW*s)+'px'; cv.style.height=(VH*s)+'px'; }
addEventListener('resize',fit); fit(); syncShopBtn();

/* ---- test hooks ---- */
window.__run={ get state(){return state;}, get p(){return p;}, get meters(){return meters;}, startRun, flip, jumpPress, jumpRelease, update,
  segAt, solidAt, bothGapAt, get rec(){return rec;}, get mult(){return mult;}, get aspect(){return aspect;}, get runSpeed(){return runSpeed;},
  get runDist(){return runDist;}, get runTime(){return runTime;}, get streak(){return streak;}, get biomeIdx(){return biomeIdx;},
  get pickups(){return pickups;}, get embersRun(){return embersRun;}, get shield(){return shield;}, set shield(v){shield=v;},
  get overdriveT(){return overdriveT;}, giveOverdrive(){overdriveT=T.odDur;}, activatePower, get missions(){return rec.missions;},
  get segs(){return segs;}, set runDist(v){runDist=v; p.wx=runDist+ANCHOR;}, set aspect(v){aspect=v;},
  get combo(){return combo;}, get flowT(){return flowT;}, get floats(){return floats;}, get hitstop(){return hitstop;} };
</script>
